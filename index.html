<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5분 성찰 체크인</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">

<style>
* { font-family: 'Noto Sans KR'; }
.mood-btn{transition:.2s}
.mood-btn.selected{transform:scale(1.3)}
</style>
</head>

<body class="bg-pink-50 flex justify-center items-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow w-96">

<h1 class="text-xl font-bold text-center mb-4 text-pink-500">
🌸 삼땡반 체크인
</h1>

<!-- 출석 -->
<div id="checkin-view">

<select id="student-select" class="w-full p-2 border rounded mb-3">
<option value="">출석번호 선택</option>
<option value="1">1번 강은지</option>
<option value="2">2번 김가은</option>
<option value="3">3번 김가현</option>
<option value="4">4번 김영훈</option>
<option value="5">5번 김윤석</option>
<option value="6">6번 박세현</option>
<option value="7">7번 박재량</option>
<option value="8">8번 박지원</option>
<option value="9">9번 박환주</option>
<option value="10">10번 변호섭</option>
<option value="11">11번 서병수</option>
<option value="12">12번 안유찬</option>
<option value="13">13번 양승진</option>
<option value="14">14번 윤초아</option>
<option value="15">15번 이강우</option>
<option value="16">16번 이나경</option>
<option value="17">17번 이지원</option>
<option value="18">18번 이하나</option>
<option value="19">19번 장민준</option>
<option value="20">20번 정라경</option>
<option value="21">21번 정하진</option>
<option value="22">22번 조수빈</option>
<option value="23">23번 조수연</option>
<option value="24">24번 조한성</option>
<option value="25">25번 조해윤</option>
<option value="26">26번 주하준</option>
<option value="27">27번 주현우</option>
<option value="28">28번 홍혜인</option>
</select>

<button id="checkin-btn" onclick="confirmCheckIn()" class="w-full bg-pink-500 text-white py-2 rounded">
탑승 완료 🚪
</button>

</div>

<!-- 확인 -->
<div id="confirmation-view" class="hidden text-center">

<p id="student-name" class="text-lg font-bold mb-2"></p>
<p id="time-text" class="text-sm mb-4"></p>

<button onclick="startReflection()" class="w-full bg-pink-500 text-white py-2 rounded">
성찰 시작
</button>

</div>

<!-- 성찰 -->
<div id="reflection-view" class="hidden">

<p class="mt-3 mb-2">😊 기분</p>

<div class="flex justify-between mb-4">
<button class="mood-btn" onclick="selectMood(this,'😊')">😊</button>
<button class="mood-btn" onclick="selectMood(this,'😐')">😐</button>
<button class="mood-btn" onclick="selectMood(this,'😢')">😢</button>
<button class="mood-btn" onclick="selectMood(this,'😡')">😡</button>
</div>

<textarea id="yesterday-input" placeholder="어제 돌아보기" class="w-full border p-2 rounded mb-2"></textarea>
<textarea id="today-input" placeholder="오늘 계획" class="w-full border p-2 rounded mb-2"></textarea>
<textarea id="gratitude-input" placeholder="감사한 일" class="w-full border p-2 rounded mb-2"></textarea>
<textarea id="promise-input" placeholder="오늘 다짐" class="w-full border p-2 rounded mb-2"></textarea>

<button id="save-btn" onclick="saveReflection()" class="w-full bg-black text-white py-2 rounded">
완료
</button>

</div>

<p id="msg" class="text-center mt-3 text-sm"></p>

</div>

<script>

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxaesWXW2esWtytYjtyaxDcg7VWfTwqGI9Fqo4bCcLL2pC3U4reQ4yP1Fh3ZnCB3di0wA/exec';

let student = null;
let mood = '';
let attendanceData = null;
let isSending = false;

// 출석
async function confirmCheckIn(){

if(isSending) return;

const val = document.getElementById('student-select').value;

if(!val){
alert("번호 선택");
return;
}

student = val;

const now = new Date();

const minutes = now.getHours()*60 + now.getMinutes();

attendanceData = {
student: val,
time: now.toLocaleTimeString(),
iso: now.toISOString(),
minutes: minutes,
late: minutes > (8*60+40) ? "지각" : "정상"
};

isSending = true;
document.getElementById("checkin-btn").disabled = true;

const ok = await send({type:"attendance", ...attendanceData});

if(!ok){
document.getElementById("msg").innerText="⚠️ 네트워크 불안정 (기록은 계속 진행)";
}

document.getElementById("student-name").innerText = val+"번";
document.getElementById("time-text").innerText = attendanceData.time;

document.getElementById("checkin-view").classList.add("hidden");
document.getElementById("confirmation-view").classList.remove("hidden");

isSending=false;
}

// 성찰 시작
function startReflection(){
document.getElementById("confirmation-view").classList.add("hidden");
document.getElementById("reflection-view").classList.remove("hidden");
}

// 기분 선택
function selectMood(btn, m){
mood = m;
document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");
}

// 저장
async function saveReflection(){

if(isSending) return;

isSending = true;
document.getElementById("save-btn").disabled=true;

const data = {
type:"reflection",
student: student,
mood: mood,
yesterday: document.getElementById("yesterday-input").value,
today: document.getElementById("today-input").value,
gratitude: document.getElementById("gratitude-input").value,
promise: document.getElementById("promise-input").value,
time: new Date().toISOString()
};

const ok = await send(data);

if(ok){
document.getElementById("msg").innerText="저장 완료 🌿";
}else{
document.getElementById("msg").innerText="오류 발생 😢";
document.getElementById("save-btn").disabled=false;
}

isSending=false;
}

// 전송
async function send(data){
try{
  const res = await fetch(WEB_APP_URL,{
    method:"POST",
    body:JSON.stringify(data)
  });

  if(!res.ok) throw new Error();

  return true;

}catch(e){
  console.log("전송 실패", e);
  return false;
}
}

</script>

</body>
</html>
